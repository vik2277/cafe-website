<!DOCTYPE html>
<html>
<head>
  <title>BrewTown Café</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Welcome to BrewTown Café ☕</h1>
<p>Scan. Order. Relax.</p>

<h2>Menu</h2>

<div class="menu">

  <!-- (your menu items remain SAME, no change) -->

</div> <!-- ✅ THIS WAS MISSING -->

<h2>Cart</h2>
<ul id="cart"></ul>

<button onclick="placeOrder()">Order Now</button>

<!-- ✅ MOVE SCRIPT HERE -->
<script>
let cart = [];

function addToCart(item, price) {
    cart.push({ item, price });

    let cartList = document.getElementById("cart");

    let li = document.createElement("li");
    li.innerText = item + " - ₹" + price;

    cartList.appendChild(li);
}

function placeOrder() {
    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    alert("Order placed successfully!");
    cart = [];
    document.getElementById("cart").innerHTML = "";
}
</script>

</body>
</html>
